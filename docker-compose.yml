version: '3.8'

services:
  visicore:
    build: .
    container_name: carehomes-app
    restart: unless-stopped
    environment:
      - PORT=${PORT:-5002}
      - HTTPS=false
      - PRAXIS_STADT=${PRAXIS_STADT:-Wuerzburg}
      - SECRET_KEY=${SECRET_KEY}
      - DB_KEY=${DB_KEY}
    volumes:
      - carehomes-data:/app/data
      - carehomes-backups:/app/backups
    ports:
      - "${PORT:-5002}:5002"
    networks:
      - carehomes-net

volumes:
  carehomes-data:
  carehomes-backups:

networks:
  carehomes-net:
    driver: bridge
