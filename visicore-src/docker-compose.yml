version: '3.8'

services:
  caravax:
    build: .
    container_name: caravax-app
    restart: unless-stopped
    environment:
      - PORT=5002
      - HTTPS=false
      - PRAXIS_STADT=${PRAXIS_STADT:-Wuerzburg}
      - SECRET_KEY=${SECRET_KEY}
      - DB_KEY=${DB_KEY}
    volumes:
      - caravax-data:/app/data
      - caravax-backups:/app/backups
    ports:
      - "5002:5002"
    networks:
      - caravax-net

volumes:
  caravax-data:
  caravax-backups:

networks:
  caravax-net:
    driver: bridge
