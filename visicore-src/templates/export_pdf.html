{% extends "base.html" %}
{% block title %}PDF-Export – {{ app_name }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>PDF-Export</h1>
    <p style="color:var(--text-secondary); margin-top:0.25rem;">
        Patienten filtern und als PDF exportieren
    </p>
</div>

<form method="POST" action="{{ url_for('export_pdf_generate') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <!-- Filter -->
    <div class="card" style="margin-bottom:1.5rem;">
        <div class="card-header">
            <h3 class="card-title">Patienten-Filter</h3>
        </div>

        <div class="form-group">
            <label class="form-label">Welche Patienten exportieren?</label>
            <div style="display:flex; flex-direction:column; gap:0.5rem;">
                <label class="radio-option">
                    <input type="radio" name="filter_typ" value="alle" checked onchange="updateFilterUI()">
                    <span>Alle aktiven Patienten</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="filter_typ" value="faellige" onchange="updateFilterUI()">
                    <span>Nur heute fällige / überfällige</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="filter_typ" value="einrichtung" onchange="updateFilterUI()">
                    <span>Nach Einrichtung</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="filter_typ" value="station" onchange="updateFilterUI()">
                    <span>Nach Station</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="filter_typ" value="wohnort" onchange="updateFilterUI()">
                    <span>Nach Wohnort-Typ</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="filter_typ" value="behandler" onchange="updateFilterUI()">
                    <span>Nach Behandler</span>
                </label>
            </div>
        </div>

        <!-- Einrichtung-Dropdown (für 'einrichtung' und 'station') -->
        <div id="filter-einrichtung" class="form-group" style="display:none;">
            <label class="form-label" for="einrichtung_id">Einrichtung</label>
            <select id="einrichtung_id" name="einrichtung_id" class="form-control">
                <option value="">Bitte wählen...</option>
                {% for e in einrichtungen %}
                <option value="{{ e.id }}">{{ e.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Station-Dropdown (nur für 'station') -->
        <div id="filter-station" class="form-group" style="display:none;">
            <label class="form-label" for="station_id">Station</label>
            <select id="station_id" name="station_id" class="form-control">
                <option value="">Erst Einrichtung wählen...</option>
            </select>
        </div>

        <!-- Wohnort-Typ (für 'wohnort') -->
        <div id="filter-wohnort" class="form-group" style="display:none;">
            <label class="form-label">Wohnort-Typ</label>
            <div style="display:flex; gap:0.75rem;">
                <label class="radio-option">
                    <input type="radio" name="wohnort_typ" value="ZUHAUSE" checked>
                    <span>Zuhause (Hausbesuche)</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="wohnort_typ" value="HEIM">
                    <span>Heim (Einrichtungen)</span>
                </label>
            </div>
        </div>

        <!-- Behandler-Dropdown (für 'behandler') -->
        <div id="filter-behandler" class="form-group" style="display:none;">
            <label class="form-label" for="behandler_id">Behandler</label>
            <select id="behandler_id" name="behandler_id" class="form-control">
                <option value="">Bitte wählen...</option>
                {% for b in behandler %}
                <option value="{{ b.id }}">{{ b.name }}{% if b.rolle %} ({{ b.rolle }}){% endif %}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <!-- Spaltenauswahl -->
    <div class="card" style="margin-bottom:1.5rem;">
        <div class="card-header">
            <h3 class="card-title">Spalten auswählen</h3>
        </div>

        <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:0.5rem;">
            <label class="checkbox-option" style="opacity:0.6;">
                <input type="checkbox" checked disabled>
                <span>Name <small style="color:var(--text-secondary);">(immer)</small></span>
            </label>
            <label class="checkbox-option">
                <input type="checkbox" name="felder" value="geburtsdatum" checked>
                <span>Geburtsdatum</span>
            </label>
            <label class="checkbox-option">
                <input type="checkbox" name="felder" value="einrichtung_station" checked>
                <span>Einrichtung / Station</span>
            </label>
            <label class="checkbox-option">
                <input type="checkbox" name="felder" value="adresse">
                <span>Adresse</span>
            </label>
            <label class="checkbox-option">
                <input type="checkbox" name="felder" value="behandler">
                <span>Behandler</span>
            </label>
            <label class="checkbox-option">
                <input type="checkbox" name="felder" value="letzter_besuch">
                <span>Letzter Besuch</span>
            </label>
            <label class="checkbox-option">
                <input type="checkbox" name="felder" value="geplanter_besuch" checked>
                <span>Nächster Besuch</span>
            </label>
            <label class="checkbox-option">
                <input type="checkbox" name="felder" value="intervall">
                <span>Intervall (Tage)</span>
            </label>
            <label class="checkbox-option">
                <input type="checkbox" name="felder" value="cave">
                <span>CAVE</span>
            </label>
            <label class="checkbox-option">
                <input type="checkbox" name="felder" value="notizen">
                <span>Notizen</span>
            </label>
            <label class="checkbox-option">
                <input type="checkbox" name="felder" value="impfungen">
                <span>Offene Impfungen</span>
            </label>
        </div>

        <div style="margin-top:0.75rem; display:flex; gap:0.5rem;">
            <button type="button" class="btn btn-secondary btn-sm" onclick="toggleAll(true)">Alle auswählen</button>
            <button type="button" class="btn btn-secondary btn-sm" onclick="toggleAll(false)">Alle abwählen</button>
        </div>
    </div>

    <div class="btn-group">
        <button type="submit" class="btn btn-primary">
            PDF erstellen
        </button>
    </div>
</form>

<style>
    .radio-option, .checkbox-option {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        padding: 0.4rem 0.5rem;
        border-radius: var(--radius);
        transition: background 0.15s;
    }
    .radio-option:hover, .checkbox-option:hover {
        background: var(--bg-secondary);
    }
    .radio-option input, .checkbox-option input {
        accent-color: var(--primary);
        width: 16px;
        height: 16px;
        flex-shrink: 0;
    }
    .btn-sm {
        padding: 0.3rem 0.75rem;
        font-size: 0.8rem;
    }
</style>
{% endblock %}

{% block scripts %}
<script>
function updateFilterUI() {
    var typ = document.querySelector('input[name="filter_typ"]:checked').value;
    document.getElementById('filter-einrichtung').style.display =
        (typ === 'einrichtung' || typ === 'station') ? 'block' : 'none';
    document.getElementById('filter-station').style.display =
        typ === 'station' ? 'block' : 'none';
    document.getElementById('filter-wohnort').style.display =
        typ === 'wohnort' ? 'block' : 'none';
    document.getElementById('filter-behandler').style.display =
        typ === 'behandler' ? 'block' : 'none';
}

document.getElementById('einrichtung_id').addEventListener('change', function() {
    var eid = this.value;
    var stationSelect = document.getElementById('station_id');
    stationSelect.innerHTML = '<option value="">Bitte wählen...</option>';
    if (!eid) return;
    fetch('/api/stationen/' + eid)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            data.forEach(function(s) {
                var opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = s.name;
                stationSelect.appendChild(opt);
            });
        });
});

function toggleAll(checked) {
    document.querySelectorAll('input[name="felder"]').forEach(function(cb) {
        cb.checked = checked;
    });
}

updateFilterUI();
</script>
{% endblock %}
